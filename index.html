<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Техническое тестирование</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-container" class="app-container">
        <div class="header">
            <span id="progress">Вопрос 1/150</span>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        
        <div id="question-section" class="card">
            <h2 id="question-text">Загрузка вопросов...</h2>
            <div id="options-container" class="options-grid"></div>

            <div class="navigation-controls">
                <button id="prev-btn" class="nav-btn hidden">Назад</button>
                <button id="next-btn" class="nav-btn hidden">Далее</button>
            </div>
        </div>
        
        <div id="result-section" class="card hidden">
            <h2>Тест завершен!</h2>
            <p id="final-score">Вы набрали 0 из 150</p>
            <button id="restart-btn" class="restart-btn">Начать заново</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
